name: C++ CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'
  pull_request:
    branches:
      - main
      - develop
      - 'release/*'

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libsodium-dev ccache

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Cache FetchContent
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-fetchcontent-

    - name: Configure CMake
      run: cmake -B build -S . -DBUILD_OBSCURAGATEWAY_TESTS=ON -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build project
      run: cmake --build build

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure